<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Admission Login</title>
  <style>
    :root {
      --primary-color: #0284c7;
      --primary-hover: #0369a1;
      --bg-color: #f0fdf4;
      --card-bg: #ffffff;
      --text-color: #334155;
      --border-color: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h2 {
      color: #0f172a;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      color: #64748b;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .forgot-pass {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-pass:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .login-btn:hover {
      background-color: var(--primary-hover);
    }

    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #64748b;
    }

    .footer-text a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="header">
      <h2>College Admission Portal</h2>
      <p>Sign in to continue your application process</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Application No. / Email ID</label>
        <input type="text" id="username" placeholder="e.g., ADM2026102" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="course">Applying For</label>
        <select id="course" required>
          <option value="" disabled selected>Select your stream</option>
          <option value="ug">Undergraduate (B.Tech, B.Sc, B.Com)</option>
          <option value="pg">Postgraduate (M.Tech, M.Sc, MBA)</option>
          <option value="phd">Ph.D. Research</option>
        </select>
      </div>

      <div class="options-row">
        <label class="remember-me">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-pass" onclick="alert('Password reset link sent to your registered email!')">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Login to Portal</button>
    </form>

    <div class="footer-text">
      New Applicant? <a href="#" onclick="alert('Redirecting to Registration Form...')">Register Here</a>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const course = document.getElementById('course').value;
      
      // आउटपुट एक्शन एलर्ट पॉपअप
      alert(`Welcome back! Successfully logged into the ${course.toUpperCase()} Admission Portal for ID: ${username}`);
    }
  </script>

</body>
</html>
